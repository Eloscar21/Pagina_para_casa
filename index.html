<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Visualiza de forma interactiva archivos 3D de Blender (GLTF, GLB, OBJ, FBX, STL, PLY) directamente en tu navegador. Rotación de modelos, cuadrículas, wireframe y control de luces.">
  <title>Visor 3D Interactivo de Archivos Blender - Preview Studio</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="styles.css">

  <!-- Core React and Babel Standalone for CDN loading -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    // Register custom Babel preset for classic React runtime (React.createElement)
    // to avoid ES module 'import' statements that fail in non-module scripts.
    Babel.registerPreset("react-classic", {
      presets: [
        [Babel.availablePresets["react"], { runtime: "classic" }],
        Babel.availablePresets["env"]
      ]
    });
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- ThreeJS Core and Helpers -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  
  <!-- ThreeJS 3D Loader scripts -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/PLYLoader.js"></script>
  
  <!-- FBXLoader depends on fflate for zipped formats -->
  <script src="https://cdn.jsdelivr.net/npm/fflate@0.7.4/umd/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
</head>
<body>
  
  <!-- React App Root Container -->
  <div id="root"></div>

  <!-- Load Babel JSX React App components -->
  <script type="text/babel" data-presets="react-classic" src="app.js"></script>

</body>
</html>
